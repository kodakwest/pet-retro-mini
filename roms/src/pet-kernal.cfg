MEMORY {
    KERNAL: start = $F000, size = $0FD2, fill = yes, fillval = $EA, file = %O;
    CHROUT: start = $FFD2, size = $0012, fill = yes, fillval = $EA, file = %O;
    CHRIN: start = $FFE4, size = $000C, fill = yes, fillval = $EA, file = %O;
    PLOT: start = $FFF0, size = $000A, fill = yes, fillval = $EA, file = %O;
    VECTMEM: start = $FFFA, size = $0006, fill = yes, fillval = $EA, file = %O;
}
SEGMENTS {
    CODE: load = KERNAL, type = ro;
    CHROUT_JUMP: load = CHROUT, type = ro;
    CHRIN_JUMP: load = CHRIN, type = ro;
    PLOT_JUMP: load = PLOT, type = ro;
    VECTORS: load = VECTMEM, type = ro;
}
